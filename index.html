<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Complaint &amp; Feedback System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="BBH-logo-1-1B.png" alt="BBH Logo">
               
            </div>

            <h1 class="login-title">Employee Login</h1>

            <form id="login_form" onsubmit="return false;">
                <label for="employee_id">Employee ID:</label>
                <input type="text" id="employee_id" name="employee_id" 
                    placeholder="Enter your Employee ID" autocomplete="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" 
                    placeholder="Enter your password" autocomplete="current-password" required>

                <span id="login_error"></span>
                <button type="submit" id="login_btn" onclick="handleLogin()">Login</button>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
