
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint and Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <img src="BBH-logo-1-1B.png" alt="" srcset="">
        <h1>Complaint and Feedback Form</h1>

        <form onsubmit="return validateform()">

            <!-- BASIC INFORMATION -->
            <div class="accordion-section open" data-section="0">
                <button type="button" class="accordion-header" onclick="toggleSection(0)">
                    <span class="accordion-icon">−</span>
                    <span>Basic Information</span>
                </button>
                <div class="accordion-content">
                    <fieldset class="boxes">
                        <table>
                            <tr class="blocks">

                                <td><label>Operation:</label></td>
                                <td>
                                    <input type="radio" name="operation" id="complaint" value="Complaint">
                                    <label for="complaint">Complaint</label>
                                </td>
                                <td>
                                    <input type="radio" name="operation" id="feedback" value="Feedback">
                                    <label for="feedback">Feedback</label>
                                </td>

                                <td>
                                    <span id="formno" class="formnobox"></span>
                                    <input type="hidden" name="form_no" id="formno_hidden">
                                </td>
                            </tr>

                            <tr>
                                <td colspan="2"><span id="operation_empty" style="color:red;"></span></td>
                            </tr>
                            <tr class="blocks">
                                <td><label for="given_by">Given by:</label></td>
                                <td>
                                    <select id="given_by" name="given_by">
                                        <option value="">-- Select --</option>
                                        <option value="Doctor">Doctor</option>
                                        <option value="Patient">Patient</option>
                                        <option value="Attender">Attender</option>
                                        <option value="Staff">Staff</option>
                                        <option value="Others">Others</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><span id="given_by_empty" style="color:red;"></span></td>
                            </tr>
                            <tr class="blocks">
                                <td><label for="date">Date:</label></td>
                                <td>
                                    <span id="date"></span>
                                    <input type="hidden" name="date" id="date_hidden">
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><span id="formDate_empty" style="color:red;"></span></td>
                            </tr>
                        </table>
                    </fieldset>
                </div>
            </div>

            <!-- INCIDENT DETAILS -->
            <div class="accordion-section" data-section="1">
                <button type="button" class="accordion-header" onclick="toggleSection(1)">
                    <span class="accordion-icon">+</span>
                    <span>Incident Details</span>
                </button>
                <div class="accordion-content">
                    <fieldset class="boxes">
                        <table>
                            <tr class="blocks">
                                <td><label for="department_section">Department / Section:</label></td>
                                <td>
                                    <select id="department_section" name="department_section">
                                        <option value="">-- Select --</option>
                                        <option value="Bio_Chemistry">Bio-Chemistry</option>
                                        <option value="Hematology">Hematology</option>
                                        <option value="Micro_Biology">Micro-Biology</option>
                                        <option value="Clinical_Pathology">Clinical-Pathology</option>
                                        <option value="Histo_Pathology">Histo-Pathology</option>
                                        <option value="Molecular_Biology">Molecular-Biology</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><span id="department_section_empty" style="color:red;"></span></td>
                            </tr>
                            <tr class="blocks">
                                <td><label for="incident_description">Incident Description:</label></td>
                            </tr>
                            <tr class="blocks">
                                <td colspan="2">
                                    <textarea name="incident_description" id="incident_description" rows="10"
                                        placeholder="Describe the incident"></textarea>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><span id="incident_description_empty" style="color:red;"></span></td>
                            </tr>
                        </table>
                    </fieldset>
                </div>
            </div>

            <!-- ERROR CLASSIFICATION -->
            <div class="accordion-section" data-section="2">
                <button type="button" class="accordion-header" onclick="toggleSection(2)">
                    <span class="accordion-icon">+</span>
                    <span>Error Classification</span>
                </button>
                <div class="accordion-content">
                    <fieldset class="boxes">
                        <table>
                            <tr class="blocks">
                                <td><label for="main_category">Error Category:</label></td>
                                <td>
                                    <select name="main_category" id="main_category" onchange="updateSub()">
                                        <option value="">-- Please select --</option>
                                        <option value="pre">Pre-Analytic Errors</option>
                                        <option value="analytic">Analytic Errors</option>
                                        <option value="post">Post-Analytic Errors</option>
                                        <option value="others">Clinically Not Correlating / No Lab Error / Others
                                        </option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><span id="main_category_empty" style="color:red;"></span></td>
                            </tr>
                            <tr id="pre_row" style="display:none;" class="blocks">
                                <td><label for="pre_analytic_error">Pre-Analytic Errors:</label></td>
                                <td>
                                    <select name="pre_analytic_error" id="pre_analytic_error">
                                        <option value="">-- Please select --</option>
                                        <option value="Wrong id of patient / wrong sample">Wrong id of patient / wrong
                                            sample</option>
                                        <option value="Wrong label at collection">Wrong label at collection</option>
                                        <option value="Wrong label at reception">Wrong label at reception</option>
                                        <option value="Wrong order / wrong test">Wrong order / wrong test</option>
                                        <option value="Wrong container / container related">Wrong container / container
                                            related</option>
                                        <option value="Staffing / waiting">Staffing / waiting</option>
                                        <option value="MIS related / demographics wrong">MIS related / demographics
                                            wrong
                                        </option>
                                        <option value="Sample missing">Sample missing</option>
                                        <option value="Test not done / sample not collected">Test not done / sample not
                                            collected</option>
                                        <option value="OP sample haemolysed">OP sample haemolysed</option>
                                        <option value="Other in collection">Other in collection</option>
                                        <option value="No label / wrong labels">No label / wrong labels</option>
                                        <option value="Test done late">Test done late</option>
                                        <option value="Improper sample">Improper sample</option>
                                        <option value="Wrong sample">Wrong sample</option>
                                        <option value="Waiting time">Waiting time</option>
                                    </select>
                                </td>
                            </tr>
                            <tr id="analytic_row" style="display:none;" class="blocks">
                                <td><label for="analytic_error">Analytic Errors:</label></td>
                                <td>
                                    <select name="analytic_error" id="analytic_error">
                                        <option value="">-- Please select --</option>
                                        <option value="Analysis">Analysis</option>
                                        <option value="Recording">Recording</option>
                                        <option value="QC">QC</option>
                                        <option value="Maintenance">Maintenance</option>
                                        <option value="Critical reporting">Critical reporting</option>
                                    </select>
                                </td>
                            </tr>
                            <tr id="post_row" style="display:none;" class="blocks">
                                <td><label for="post_analytic_error">Post-Analytic Errors:</label></td>
                                <td>
                                    <select name="post_analytic_error" id="post_analytic_error">
                                        <option value="">-- Please select --</option>
                                        <option value="Transcription error">Transcription error</option>
                                        <option value="Reference range / units / report format">Reference range / units
                                            /
                                            report format</option>
                                        <option value="Turn around time delay">Turn around time delay</option>
                                        <option value="Other">Other</option>
                                        <option value="Wrong report">Wrong report</option>
                                    </select>
                                </td>
                            </tr>
                            <tr id="others_row" style="display:none;" class="blocks">
                                <td><label for="no_lab_error">Clinically Not Correlating / No Lab Error /
                                        Others:</label>
                                </td>
                                <td>
                                    <select name="no_lab_error" id="no_lab_error">
                                        <option value="">-- Please select --</option>
                                        <option value="Clinically not correlating">Clinically not correlating</option>
                                        <option value="No lab error">No lab error</option>
                                        <option value="Professionalism / Courtesy">Professionalism / Courtesy</option>
                                        <option value="Machine / Instrument related">Machine / Instrument related
                                        </option>
                                        <option value="Availability of reagents / stock">Availability of reagents /
                                            stock
                                        </option>
                                        <option value="Records">Records</option>
                                        <option value="Improvement">Improvement</option>
                                        <option value="IT related error (Hardware / Software)">IT related error
                                            (Hardware /
                                            Software)</option>
                                    </select>
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </div>
            </div>

            <!-- ERROR ANALYSIS -->
            <div class="accordion-section" data-section="3">
                <button type="button" class="accordion-header" onclick="toggleSection(3)">
                    <span class="accordion-icon">+</span>
                    <span>Error Analysis</span>
                </button>
                <div class="accordion-content">
                    <fieldset class="boxes">
                        <table>
                            <tr class="blocks">
                                <td>Choose from below:</td>
                            </tr>
                            <tr class="blocks">
                                <td>
                                    <input type="checkbox" name="active_error" id="active_error">
                                    <label for="active_error">Active Error (front line / technician error)</label>
                                </td>
                            </tr>
                            <tr class="blocks">
                                <td>
                                    <input type="checkbox" name="latent_error" id="latent_error">
                                    <label for="latent_error">Latent Error (back end / underlying factors)</label>
                                </td>
                            </tr>
                            <tr class="blocks">
                                <td>
                                    <input type="checkbox" name="cognitive_error" id="cognitive_error">
                                    <label for="cognitive_error">Cognitive Error (insufficient knowledge)</label>
                                </td>
                            </tr>
                            <tr class="blocks">
                                <td>
                                    <input type="checkbox" name="non_cognitive_error" id="non_cognitive_error">
                                    <label for="non_cognitive_error">Non-Cognitive Error (slip / unconscious
                                        lapse)</label>
                                </td>
                            </tr>
                            <tr class="blocks">
                                <td><label for="root_cause">Root Cause:</label></td>
                            </tr>
                            <tr class="blocks">
                                <td colspan="2">
                                    <textarea name="root_cause" id="root_cause" rows="10"
                                        placeholder="Describe the root cause"></textarea>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><span id="root_cause_empty" style="color:red;"></span></td>
                            </tr>
                        </table>
                    </fieldset>
                </div>
            </div>

            <!-- RISK SCORE -->
            <div class="accordion-section" data-section="4">
                <button type="button" class="accordion-header" onclick="toggleSection(4)">
                    <span class="accordion-icon">+</span>
                    <span>Risk Score</span>
                </button>
                <div class="accordion-content">
                    <fieldset class="boxes">
                        <div class="risk-wrapper">
                            <div class="risk-left">
                                <table class="risk">
                                    <tr>
                                        <th>Risk Description</th>
                                        <th>Impact Score (0-5)</th>
                                        <th>Freq Score (0-5)</th>
                                        <th>Risk Score</th>
                                    </tr>
                                    <tr>
                                        <td><input type="text" name="Risk_discription1" placeholder="Describe the risk">
                                        </td>
                                        <td><input type="number" name="impact_score1" id="impact_score1" min="0"
                                                max="5"></td>
                                        <td><input type="number" name="freq_score1" id="freq_score1" min="0" max="5">
                                        </td>
                                        <td><span id="risk_score1"></span></td>
                                    </tr>
                                    <tr>
                                        <td><input type="text" name="Risk_discription2" placeholder="Describe the risk">
                                        </td>
                                        <td><input type="number" name="impact_score2" id="impact_score2" min="0"
                                                max="5"></td>
                                        <td><input type="number" name="freq_score2" id="freq_score2" min="0" max="5">
                                        </td>
                                        <td><span id="risk_score2"></span></td>
                                    </tr>
                                    <tr>
                                        <td><input type="text" name="Risk_discription3" placeholder="Describe the risk">
                                        </td>
                                        <td><input type="number" name="impact_score3" id="impact_score3" min="0"
                                                max="5"></td>
                                        <td><input type="number" name="freq_score3" id="freq_score3" min="0" max="5">
                                        </td>
                                        <td><span id="risk_score3"></span></td>
                                    </tr>
                                    <tr>
                                        <td><input type="text" name="Risk_discription4" placeholder="Describe the risk">
                                        </td>
                                        <td><input type="number" name="impact_score4" id="impact_score4" min="0"
                                                max="5"></td>
                                        <td><input type="number" name="freq_score4" id="freq_score4" min="0" max="5">
                                        </td>
                                        <td><span id="risk_score4"></span></td>
                                    </tr>
                                    <tr>
                                        <td><input type="text" name="Risk_discription5" placeholder="Describe the risk">
                                        </td>
                                        <td><input type="number" name="impact_score5" id="impact_score5" min="0"
                                                max="5"></td>
                                        <td><input type="number" name="freq_score5" id="freq_score5" min="0" max="5">
                                        </td>
                                        <td><span id="risk_score5"></span></td>
                                    </tr>
                                </table>
                            </div>
                            <div class="risk-right">
                                <table>
                                    <tr class="blocks">
                                        <td><label for="impact_score">Average Impact Score (0–5):</label></td>
                                        <td><input type="number" name="impact_score" id="impact_score" min="0" max="5"
                                                readonly></td>
                                    </tr>
                                    <tr class="blocks">
                                        <td><label for="freq_score">Average Frequency Score (0–5):</label></td>
                                        <td><input type="number" name="freq_score" id="freq_score" min="0" max="5"
                                                readonly></td>
                                    </tr>
                                    <tr class="blocks">
                                        <td><label for="risk_score">Average Risk Score:</label></td>
                                        <td>
                                            <span id="risk_score"></span>
                                            <input type="hidden" name="risk_score" id="risk_score_hidden">
                                        </td>
                                    </tr>
                                    <tr>
                                        <td colspan="2"><span id="risk_score_evaluation" style="color:red;"></span></td>
                                    </tr>
                                </table>
                            </div>
                        </div>
                    </fieldset>
                </div>
            </div>

            <!-- ACTIONS TAKEN -->
            <div class="accordion-section" data-section="5">
                <button type="button" class="accordion-header" onclick="toggleSection(5)">
                    <span class="accordion-icon">+</span>
                    <span>Actions Taken</span>
                </button>
                <div class="accordion-content">
                    <fieldset class="boxes">
                        <table>
                            <tr class="blocks">
                                <td><label for="immediate_correction">Immediate Correction:</label></td>
                            </tr>
                            <tr class="blocks">
                                <td colspan="2">
                                    <textarea name="immediate_correction" id="immediate_correction" rows="10"
                                        placeholder="Describe the immediate correction taken"></textarea>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><span id="immediate_correction_empty" style="color:red;"></span></td>
                            </tr>
                            <tr class="blocks">
                                <td><label for="corrective_action">Corrective Action:</label></td>
                            </tr>
                            <tr class="blocks">
                                <td colspan="2">
                                    <textarea name="corrective_action" id="corrective_action" rows="10"
                                        placeholder="To prevent recurrence of the same problem"></textarea>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><span id="corrective_action_empty" style="color:red;"></span></td>
                            </tr>
                            <tr class="blocks">
                                <td><label for="preventive_action">Preventive Action:</label></td>
                            </tr>
                            <tr class="blocks">
                                <td colspan="2">
                                    <textarea name="preventive_action" id="preventive_action" rows="10"
                                        placeholder="To prevent occurrence of similar problem"></textarea>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><span id="preventive_action_empty" style="color:red;"></span></td>
                            </tr>
                            <tr class="blocks">
                                <td>Patient Consequences:</td>
                            </tr>
                            <tr class="blocks">
                                <td>
                                    <input type="radio" name="patient_consequences" id="consequences_yes" value="yes">
                                    <label for="consequences_yes">Yes</label>
                                    <input type="radio" name="patient_consequences" id="consequences_no" value="no">
                                    <label for="consequences_no">No</label>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><span id="patient_consequences_empty" style="color:red;"></span></td>
                            </tr>
                        </table>
                    </fieldset>
                </div>
            </div>

            <!-- SUBMIT (Export Data now lives on the dashboard) -->
            <div class="form-footer">
                <button type="submit">Submit</button>
                <a href="dashboard.html" class="btn-link">Back to Dashboard</a>
            </div>

        </form>
    </div>

    <script src="auth-guard.js"></script>
    <script src="form.js"></script>

</body>

</html>
